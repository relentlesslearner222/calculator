<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display" aria-live="polite">
        <div class="display__expression" id="expression" aria-label="Expression"></div>
        <div class="display__result"   id="result"     aria-label="Result">0</div>
      </div>

      <!-- Button grid -->
      <div class="buttons">

        <!-- Row 1 -->
        <button class="btn btn--wide btn--utility" data-action="clear"     aria-label="Clear">AC</button>
        <button class="btn btn--utility"           data-action="backspace"  aria-label="Backspace">⌻</button>
        <button class="btn btn--operator"          data-action="percent"    aria-label="Percent">%</button>
        <button class="btn btn--operator"          data-action="operator" data-value="/" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn--digit" data-action="digit" data-value="7" aria-label="7">7</button>
        <button class="btn btn--digit" data-action="digit" data-value="8" aria-label="8">8</button>
        <button class="btn btn--digit" data-action="digit" data-value="9" aria-label="9">9</button>
        <button class="btn btn--operator" data-action="operator" data-value="*" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn--digit" data-action="digit" data-value="4" aria-label="4">4</button>
        <button class="btn btn--digit" data-action="digit" data-value="5" aria-label="5">5</button>
        <button class="btn btn--digit" data-action="digit" data-value="6" aria-label="6">6</button>
        <button class="btn btn--operator" data-action="operator" data-value="-" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn--digit" data-action="digit" data-value="1" aria-label="1">1</button>
        <button class="btn btn--digit" data-action="digit" data-value="2" aria-label="2">2</button>
        <button class="btn btn--digit" data-action="digit" data-value="3" aria-label="3">3</button>
        <button class="btn btn--operator" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn--digit btn--wide" data-action="digit" data-value="0" aria-label="0">0</button>
        <button class="btn btn--digit"             data-action="decimal"             aria-label="Decimal point">.</button>
        <button class="btn btn--equals"            data-action="equals"              aria-label="Equals">=</button>

      </div>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
