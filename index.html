<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">
      <!-- Display -->
      <div class="display" aria-live="polite" aria-atomic="true">
        <div class="display__expression" id="expression">&nbsp;</div>
        <div class="display__result" id="result">0</div>
      </div>

      <!-- Button Grid -->
      <div class="buttons-grid">

        <!-- Row 1 -->
        <button class="btn btn--action span-2" data-action="clear"         aria-label="Clear all">AC</button>
        <button class="btn btn--action"         data-action="backspace"     aria-label="Backspace">&#Ÿ;</button>
        <button class="btn btn--operator"       data-action="operator" data-value="/"   aria-label="Divide">&divide;</button>

        <!-- Row 2 -->
        <button class="btn btn--number" data-action="number" data-value="7">7</button>
        <button class="btn btn--number" data-action="number" data-value="8">8</button>
        <button class="btn btn--number" data-action="number" data-value="9">9</button>
        <button class="btn btn--operator" data-action="operator" data-value="*" aria-label="Multiply">&times;</button>

        <!-- Row 3 -->
        <button class="btn btn--number" data-action="number" data-value="4">4</button>
        <button class="btn btn--number" data-action="number" data-value="5">5</button>
        <button class="btn btn--number" data-action="number" data-value="6">6</button>
        <button class="btn btn--operator" data-action="operator" data-value="-" aria-label="Subtract">&minus;</button>

        <!-- Row 4 -->
        <button class="btn btn--number" data-action="number" data-value="1">1</button>
        <button class="btn btn--number" data-action="number" data-value="2">2</button>
        <button class="btn btn--number" data-action="number" data-value="3">3</button>
        <button class="btn btn--operator" data-action="operator" data-value="+" aria-label="Add">&plus;</button>

        <!-- Row 5 -->
        <button class="btn btn--number span-2" data-action="number" data-value="0">0</button>
        <button class="btn btn--number"         data-action="decimal"                                aria-label="Decimal point">.</button>
        <button class="btn btn--equals"         data-action="equals"                                aria-label="Equals">=</button>

      </div>
    </div>

    <p class="hint">Keyboard supported: 0-9, + - * /, Enter, Backspace, Esc</p>

    <script src="app.js"></script>
  </body>
</html>
