<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display">
        <div class="display__expression" id="expression" aria-live="polite"></div>
        <div class="display__result" id="result" aria-live="assertive">0</div>
      </div>

      <!-- Button Grid -->
      <div class="buttons">

        /** Row 1 */
        <button class="btn btn--wide btn--danger"  id="btn-clear"               aria-label="Clear all">AC</button>
        <button class="btn btn--secondary"          id="btn-sign"                aria-label="Toggle sign">+/-</button>
        <button class="btn btn--secondary"          id="btn-percent"             aria-label="Percent">%</button>
        <button class="btn btn--operator"           data-op="/"                  aria-label="Divide">&#247;</button>

        /** Row 2 */
        <button class="btn btn--number"             data-value="7"                aria-label="7">7</button>
        <button class="btn btn--number"             data-value="8"                aria-label="8">8</button>
        <button class="btn btn--number"             data-value="9"                aria-label="9">9</button>
        <button class="btn btn--operator"           data-op="*"                  aria-label="Multiply">&#215;</button>

        /** Row 3 */
        <button class="btn btn--number"             data-value="4"                aria-label="4">4</button>
        <button class="btn btn--number"             data-value="5"                aria-label="5">5</button>
        <button class="btn btn--number"             data-value="6"                aria-label="6">6</button>
        <button class="btn btn--operator"           data-op="-"                  aria-label="Subtract">&#8721;</button>

        /** Row 4 */
        <button class="btn btn--number"             data-value="1"                aria-label="1">1</button>
        <button class="btn btn--number"             data-value="2"                aria-label="2">2</button>
        <button class="btn btn--number"             data-value="3"                aria-label="3">3</button>
        <button class="btn btn--operator"           data-op="+"                   aria-label="Add">+</button>

        /** Row 5 */
        <button class="btn btn--number btn--wide"   data-value="0"                aria-label="0">0</button>
        <button class="btn btn--number"             id="btn-decimal"              aria-label="Decimal point">.</button>
        <button class="btn btn--equals"             id="btn-equals"               aria-label="Equals">=</button>

      </div>
    </div>

    <footer class="footer">
      <small>Keyboard supported &#128101; | Backspace to delete</small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
